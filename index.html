<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synthetic Index Trading Journal</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Trading Journal</h1>
            <p class="subtitle">Synthetic Indices</p>
        </header>

        <!-- Summary Stats -->
        <section class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-label">Total Trades</div>
                <div class="stat-value" id="totalTrades">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Win Rate</div>
                <div class="stat-value" id="winRate">0%</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total R</div>
                <div class="stat-value" id="totalR">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Avg R</div>
                <div class="stat-value" id="avgR">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Expectancy</div>
                <div class="stat-value" id="expectancy">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Current Streak</div>
                <div class="stat-value" id="streak">-</div>
            </div>
        </section>

        <!-- Entry Form -->
        <section class="form-section">
            <button class="toggle-btn" id="toggleForm">+ New Trade</button>
            <form id="tradeForm" class="hidden">
                <div class="form-row">
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" id="date" required>
                    </div>
                    <div class="form-group">
                        <label>Time</label>
                        <input type="time" id="time" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Instrument</label>
                        <select id="instrument" required>
                            <option value="">Select</option>
                            <option>V10</option>
                            <option>V25</option>
                            <option>V50</option>
                            <option>V75</option>
                            <option>V100</option>
                            <option>Crash 500</option>
                            <option>Crash 1000</option>
                            <option>Boom 500</option>
                            <option>Boom 1000</option>
                            <option>Step Index</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Direction</label>
                        <select id="direction" required>
                            <option value="">Select</option>
                            <option>Long</option>
                            <option>Short</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Entry Price</label>
                        <input type="number" id="entry" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label>Stop Loss</label>
                        <input type="number" id="stop" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label>Target</label>
                        <input type="number" id="target" step="0.01" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Exit Price</label>
                        <input type="number" id="exit" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label>Exit Time</label>
                        <input type="time" id="exitTime" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Setup</label>
                        <select id="setup" required>
                            <option value="">Select</option>
                            <option>FVG</option>
                            <option>Breaker Block</option>
                            <option>Order Block</option>
                            <option>Fair Value Gap + Breaker</option>
                            <option>Liquidity Sweep</option>
                            <option>Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Execution Grade</label>
                        <select id="grade" required>
                            <option value="">Select</option>
                            <option>A</option>
                            <option>B</option>
                            <option>C</option>
                            <option>D</option>
                            <option>F</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Mental State (1-5)</label>
                        <select id="mentalState" required>
                            <option value="">Select</option>
                            <option>1</option>
                            <option>2</option>
                            <option>3</option>
                            <option>4</option>
                            <option>5</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Screenshot Path</label>
                    <input type="text" id="screenshot" placeholder="assets/screenshots/20260530-001.png">
                </div>
                <div class="form-group">
                    <label>Notes</label>
                    <textarea id="notes" rows="3"></textarea>
                </div>
                <button type="submit" class="submit-btn">Add Trade</button>
            </form>
        </section>

        <!-- Filters -->
        <section class="filters">
            <select id="filterInstrument">
                <option value="">All Instruments</option>
            </select>
            <select id="filterOutcome">
                <option value="">All Outcomes</option>
                <option>Win</option>
                <option>Loss</option>
                <option>Breakeven</option>
            </select>
            <select id="filterGrade">
                <option value="">All Grades</option>
                <option>A</option>
                <option>B</option>
                <option>C</option>
                <option>D</option>
                <option>F</option>
            </select>
            <button id="clearFilters">Clear</button>
        </section>

        <!-- Trade Table -->
        <section class="table-section">
            <table id="tradeTable">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Instrument</th>
                        <th>Dir</th>
                        <th>Entry</th>
                        <th>Exit</th>
                        <th>R</th>
                        <th>Outcome</th>
                        <th>Grade</th>
                        <th>Setup</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tradeBody">
                </tbody>
            </table>
        </section>

        <!-- Export -->
        <section class="export-section">
            <button id="exportBtn" class="export-btn">Export trades.json</button>
            <p class="hint">Download and commit to your repo to save</p>
        </section>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
